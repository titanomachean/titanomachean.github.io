<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caribbean 2-Player Volley</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: none; }
        canvas { background: #87CEEB; max-width: 100%; max-height: 100vh; border: 4px solid white; box-sizing: border-box; }
        #ui { position: absolute; top: 10px; color: white; font-family: sans-serif; font-size: 24px; text-shadow: 2px 2px 0px #000; pointer-events: none; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div id="ui">Gauju 1: <span id="p1Score">0</span> | Gauju 2: <span id="p2Score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 450;

// --- ASSETS ---
const bgImg = new Image(); bgImg.src = 'beach.png';
const ballImg = new Image(); ballImg.src = 'volleyball.png';
const p1Img = new Image(); p1Img.src = 'player1.png';
const p2Img = new Image(); p2Img.src = 'player2.png';

// --- GAME STATE ---
let scores = { p1: 0, p2: 0 };
const gravity = 0.5;

const ball = { x: 400, y: 100, r: 20, dx: 4, dy: 0 };
const p1 = { x: 100, y: 320, w: 80, h: 120, dy: 0, jumping: false, side: 'left' };
const p2 = { x: 620, y: 320, w: 80, h: 120, dy: 0, jumping: false, side: 'right' };

// --- INPUTS (Keyboard & Touch) ---
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Mobile Touch Handling
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const touchX = (touch.clientX - rect.left) * (canvas.width / rect.width);
    
    // Tap left side to jump P1, right side to jump P2
    if (touchX < canvas.width / 2 && !p1.jumping) p1.dy = -13;
    if (touchX > canvas.width / 2 && !p2.jumping) p2.dy = -13;
});

function handlePhysics(obj, floorY) {
    obj.dy += gravity;
    obj.y += obj.dy;
    if (obj.y > floorY) { obj.y = floorY; obj.dy = 0; obj.jumping = false; }
}

function checkCollision(p, b) {
    if (b.x + b.r > p.x && b.x - b.r < p.x + p.w && b.y + b.r > p.y && b.y - b.r < p.y + p.h) {
        b.dy = -12;
        b.dx = (b.x - (p.x + p.w/2)) * 0.5;
        b.y = p.y - b.r;
    }
}

function update() {
    // P1 Keys (A, D, Space)
    if (keys['KeyA'] && p1.x > 0) p1.x -= 7;
    if (keys['KeyD'] && p1.x < canvas.width/2 - p1.w) p1.x += 7;
    if (keys['Space'] && !p1.jumping) { p1.dy = -13; p1.jumping = true; }

    // P2 Keys (Arrows)
    if (keys['ArrowLeft'] && p2.x > canvas.width/2) p2.x -= 7;
    if (keys['ArrowRight'] && p2.x < canvas.width - p2.w) p2.x += 7;
    if (keys['ArrowUp'] && !p2.jumping) { p2.dy = -13; p2.jumping = true; }

    handlePhysics(p1, 320);
    handlePhysics(p2, 320);
    
    ball.dy += gravity * 0.6/2;
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Ball Scoring Logic
    if (ball.x < 0 || ball.x > canvas.width) ball.dx *= -1;
    if (ball.y + ball.r > canvas.height - 30) {
        if (ball.x < canvas.width / 2) scores.p2++;
        else scores.p1++;
        document.getElementById('p1Score').innerText = scores.p1;
        document.getElementById('p2Score').innerText = scores.p2;
        ball.x = 400; ball.y = 100; ball.dx = (Math.random() > 0.5 ? 4 : -4); ball.dy = 0;
    }

    checkCollision(p1, ball);
    checkCollision(p2, ball);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (bgImg.complete) ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    
    // Draw Net
    ctx.fillStyle = "white"; ctx.fillRect(canvas.width/2 - 2, 200, 4, 250);

    // Draw Players & Ball
    if (p1Img.complete) ctx.drawImage(p1Img, p1.x, p1.y, p1.w, p1.h);
    if (p2Img.complete) ctx.drawImage(p2Img, p2.x, p2.y, p2.w, p2.h);
    if (ballImg.complete) ctx.drawImage(ballImg, ball.x-ball.r, ball.y-ball.r, ball.r*2, ball.r*2);

    requestAnimationFrame(() => { update(); draw(); });
}

draw();
</script>
</body>
</html>
