<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Omoa Fishing Alpha</title>
    <style>
        body { margin: 0; background: #0077be; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: linear-gradient(#1e90ff, #00ced1); }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Walter's Score (Los Pescados de Walter): <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;

// 1. Create and Preload Fish Image
const fishImg = new Image();
fishImg.src = 'tunaHonduras.jpg'; // Example: Magikarp

let fish = { x: -100, y: 200, speed: 3, w: 3*100, h: 2*100 };

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    fish.x += fish.speed;
    if (fish.x > canvas.width) {
        fish.x = -100;
        fish.y = Math.random() * (canvas.height - 100);
    }

    // 2. Draw the Image instead of shapes
    if (fishImg.complete) { // Check if image is loaded
        ctx.drawImage(fishImg, fish.x, fish.y, fish.w, fish.h);
    }

    requestAnimationFrame(update);
}

canvas.addEventListener('mousedown', (e) => {
    // Collision detection using image dimensions
    if (e.clientX > fish.x && e.clientX < fish.x + fish.w &&
        e.clientY > fish.y && e.clientY < fish.y + fish.h) {
        score++;
        scoreEl.innerText = score;
        fish.x = -100;
        fish.y = Math.random() * (canvas.height - 100);
    }
});

fishImg.onload = update; // Start game loop once image is ready

// Function to handle both Click and Touch
function handleInput(clientX, clientY) {
    if (clientX > fish.x && clientX < fish.x + fish.w &&
        clientY > fish.y && clientY < fish.y + fish.h) {
        score++;
        scoreEl.innerText = score;
        fish.x = -100;
        fish.y = Math.random() * (canvas.height - 100);
    }
}

// Mobile Touch Event
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Prevents zooming/scrolling while playing
    const touch = e.touches[0];
    handleInput(touch.clientX, touch.clientY);
}, { passive: false });

// Desktop Click Event
canvas.addEventListener('mousedown', (e) => {
    handleInput(e.clientX, e.clientY);
});

    </script>
</body>
</html>
